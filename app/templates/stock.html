<!DOCTYPE html>
<html>
<head>
    <title>Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding:20px; }
        .card {
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            color:white;
        }
        .REGISTRADO { background:#6c757d; }
        .FUNCIONA { background:#28a745; }
        .ESTROPEADO { background:#dc3545; }
        .REPARADO { background:#17a2b8; }
        .PREPARADO_VENTA { background:#007bff; }
    </style>
</head>
<body>

<h2>Stock Actual</h2>

{% for item in items %}
<div class="card {{item.estado_actual}}">
    <strong>ID:</strong> {{item.id}} <br>
    <strong>Estado:</strong> {{item.estado_actual}}
</div>
{% endfor %}

</body>
</html>
