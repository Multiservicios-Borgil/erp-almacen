{% extends "base.html" %}

{% block title %}Crear pieza{% endblock %}

{% block content %}

<h2>Crear pieza</h2>

<form method="post" action="/crear_pieza_directa">

<label>Electrodoméstico</label>

<select name="familia" id="familia">

<option value="">Seleccionar</option>

<option value="Lavadora">Lavadora</option>
<option value="Lavavajillas">Lavavajillas</option>
<option value="Frigorífico">Frigorífico</option>
<option value="Vitroceramica">Vitroceramica</option>
<option value="Placa de Induccion">Placa de Induccion</option>
<option value="Horno">Horno</option>

</select>

<br><br>

<label>Tipo de pieza</label>

<select name="nombre_pieza" id="pieza">

<option value="">Seleccionar pieza</option>

</select>

<br><br>

<label>Marca</label>

<input type="text" name="marca" style="width:100%;padding:10px;">

<br><br>

<label>Modelo</label>

<input type="text" name="modelo" style="width:100%;padding:10px;">

<br><br>

<label>Medidas (si aplica)</label>

<input type="text" name="medidas" style="width:100%;padding:10px;">

<br><br>

<button type="submit" style="padding:15px;width:100%">
Crear pieza
</button>

</form>


<script>

document.getElementById("familia").addEventListener("change", function(){

    const familia = this.value

    if(!familia) return

    fetch("/piezas_por_familia/" + familia)

    .then(response => response.json())

    .then(data => {

        const select = document.getElementById("pieza")

        select.innerHTML = '<option value="">Seleccionar pieza</option>'

        data.forEach(pieza => {

            const option = document.createElement("option")

            option.value = pieza

            option.text = pieza

            select.appendChild(option)

        })

    })

})

</script>

{% endblock %}
