<!DOCTYPE html>
<html>
<head>
<label>Diagnóstico inicial</label>

<textarea name="diagnostico_inicial" rows="3"></textarea>
    <title>Nuevo Electrodoméstico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding:20px; }
        input, select, button {
            width:100%;
            padding:14px;
            margin:10px 0;
            font-size:16px;
        }
        button {
            background:#2c7be5;
            color:white;
            border:none;
            border-radius:6px;
        }
    </style>
</head>
<body>

<h2>Nuevo Electrodoméstico</h2>

<form method="post" action="/crear_item_web">
    <label>Familia</label>
    <select name="familia_id">
        {% for f in familias %}
            <option value="{{f.id}}">{{f.nombre}}</option>
        {% endfor %}
    </select>

    <label>Número de Serie</label>
    <input type="text" name="numero_serie" required>
    <label>Marca</label>
    <input type="text" name="marca" style="width:100%;padding:10px;">	
    <label>Modelo</label>
    <input type="text" name="modelo">

    <label>Origen</label>
    <select name="origen">
        <option value="COMPRA">Compra</option>
        <option value="RETIRADO_VIVIENDA">Retirado vivienda</option>
    <label>Precio compra</label>
    <input type="number" step="0.01" name="precio_compra">

    <label>Nº albarán</label>
    <input type="text" name="numero_albaran">
    </select>

    <button type="submit">Crear</button>
</form>

</body>
</html>
