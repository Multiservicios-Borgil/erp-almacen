{% extends "base.html" %}

{% block title %}Buscar electrodomésticos{% endblock %}

{% block content %}

<h2>Buscar electrodomésticos</h2>

<form method="get">

<label>Familia</label>

<select name="familia_id">

<option value="">Todas</option>

{% for f in familias %}
<option value="{{f.id}}">{{f.nombre}}</option>
{% endfor %}

</select>

<br><br>

<label>Estado</label>

<select name="estado">

<option value="">Todos</option>

<option value="REGISTRADO">Registrado</option>
<option value="FUNCIONA">Funciona</option>
<option value="ESTROPEADO">Estropeado</option>
<option value="REPARADO">Reparado</option>

<option value="VENTA_SEGUNDA_MANO">Preparado venta segunda mano</option>
<option value="VENTA_REACONDICIONADO">Preparado venta reacondicionado</option>
<option value="VENTA_NUEVO">Preparado venta nuevo</option>

<option value="VENDIDO">Vendido</option>

</select>

<br><br>

<button type="submit">Buscar</button>

</form>

<hr>

<h3>Resultados</h3>

{% for a in aparatos %}

<div style="background:white;padding:10px;margin:10px 0;border-radius:8px;">

<b>{{a.id}}</b><br>

Modelo: {{a.modelo}} <br>
Estado: {{a.estado_actual}} <br>

<a href="/item/{{a.id}}">Ver ficha</a>

</div>

{% endfor %}

{% endblock %}
