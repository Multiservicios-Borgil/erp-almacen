{% extends "base.html" %}

{% block content %}

<h2>Buscar piezas</h2>

<form method="get">

<input type="text" name="nombre_pieza" placeholder="motor, bomba, placa">

<select name="familia_id">
<option value="">Todas</option>
<option value="1">Lavadora</option>
<option value="2">Frigorífico</option>
<option value="3">Lavavajillas</option>
<option value="4">Secadora</option>
</select>

<button type="submit">Buscar</button>

</form>

<hr>

<table>

<tr>
<th>ID</th>
<th>Pieza</th>
<th>Origen</th>
<th>Ver</th>
</tr>

{% for item in items %}

<tr>
<td>{{item.id}}</td>
<td>{{item.nombre_pieza}}</td>
<td>{{item.parent_id}}</td>
<td><a href="/item/{{item.id}}">Abrir</a></td>
</tr>

{% endfor %}

</table>

{% endblock %}
