{% extends "base.html" %}

{% block title %}Crear pieza{% endblock %}

{% block content %}

<h2>Crear pieza del aparato</h2>

<form method="post" action="/crear_pieza/{{parent_id}}">

<label>Nombre de la pieza</label>
<input type="text" name="nombre_pieza" required>

<label>Medidas</label>
<input type="text" name="medidas" placeholder="ej: 30x15x12 cm">

<button type="submit">Crear pieza</button>
</button>

</form>

{% endblock %}
