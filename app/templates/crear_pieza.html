{% extends "base.html" %}

{% block title %}Crear pieza{% endblock %}

{% block content %}

<h2>Crear pieza del aparato</h2>

<form method="post" action="/crear_pieza/{{parent_id}}">

<label>Nombre de la pieza</label>
<input type="text" name="nombre" style="width:100%;padding:10px;margin:10px 0;" required>

<button type="submit" style="background:#17a2b8;color:white;padding:10px;border:none;border-radius:5px;">
Crear pieza
</button>

</form>

{% endblock %}
