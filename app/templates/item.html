{% extends "base.html" %}

{% block title %}Ficha{% endblock %}

{% block content %}

<h2>Ficha del Aparato</h2>

<div style="background:white;padding:15px;border-radius:10px;margin-bottom:20px;">
    <strong>ID:</strong> {{item.id}} <br>
    <strong>Familia:</strong> {{item.familia}} <br>
    <strong>Estado:</strong> {{item.estado}} <br>
    <strong>Origen:</strong> {{item.origen}} <br>
    <strong>Serie:</strong> {{item.serie}}
</div>

<h3>Código QR</h3>
<img src="/static/{{item.id}}.png" width="250">

<h3>Cambiar Estado</h3>

<form method="post" action="/cambiar_estado_web/{{item.id}}">
    <button type="submit" name="nuevo_estado" value="FUNCIONA" class="btn" style="background:#28a745;">
        FUNCIONA
    </button>
</form>

<form method="post" action="/cambiar_estado_web/{{item.id}}">
    <button type="submit" name="nuevo_estado" value="ESTROPEADO" class="btn" style="background:#dc3545;">
        ESTROPEADO
    </button>
</form>

<form method="post" action="/cambiar_estado_web/{{item.id}}">
    <button type="submit" name="nuevo_estado" value="REPARADO" class="btn" style="background:#17a2b8;">
        REPARADO
    </button>
</form>

<form method="post" action="/cambiar_estado_web/{{item.id}}">
    <button type="submit" name="nuevo_estado" value="PREPARADO_VENTA" class="btn" style="background:#007bff;">
        PREPARADO PARA VENTA
    </button>
</form>

<form method="post" action="/cambiar_estado_web/{{item.id}}">
    <a href="/vender/{{item.id}}" class="btn" style="background:#6c757d;">        
    Registrar Venta
</a>
    </button>
</form>

{% endblock %}
